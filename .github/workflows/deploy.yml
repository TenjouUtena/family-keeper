name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Deployment info
        run: |
          echo "CI passed. Deployments are handled automatically:"
          echo "  - Frontend: Vercel auto-deploys from main → https://familykeeper.app"
          echo "  - Backend: Railway auto-deploys from main"
          echo ""
          echo "Verify at:"
          echo "  - https://familykeeper.app"
