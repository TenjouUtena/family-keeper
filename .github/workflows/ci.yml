name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: familykeeper
          POSTGRES_PASSWORD: familykeeper
          POSTGRES_DB: familykeeper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Lint
        run: poetry run ruff check app tests
      - name: Test
        run: poetry run pytest --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://familykeeper:familykeeper@localhost:5432/familykeeper_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
        working-directory: .
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: familykeeper
          POSTGRES_PASSWORD: familykeeper
          POSTGRES_DB: familykeeper
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend dependencies
        run: cd apps/api && poetry install
      - name: Run migrations
        run: cd apps/api && poetry run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://familykeeper:familykeeper@localhost:5432/familykeeper
      - name: Start backend
        run: cd apps/api && poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: postgresql+asyncpg://familykeeper:familykeeper@localhost:5432/familykeeper
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-e2e
          RATE_LIMIT_DISABLED: "true"
      - name: Install frontend dependencies
        run: pnpm install
      - name: Build frontend
        run: cd apps/web && pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - name: Start frontend
        run: cd apps/web && pnpm start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - name: Install Playwright
        run: cd apps/web && npx playwright install chromium --with-deps
      - name: Wait for servers
        run: |
          timeout 30 bash -c 'until curl -s http://localhost:8000/health > /dev/null; do sleep 1; done'
          timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'
      - name: Run E2E tests
        run: cd apps/web && pnpm e2e
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/test-results/
          retention-days: 7
